<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexible Costing Comparison - Direct vs ABC</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --blue:#1d4ed8;
      --green:#15803d;
      --red:#b91c1c;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%, var(--bg) 100%);
      color:#000000;
    }
    .container{max-width:1500px;margin:0 auto;padding:24px}
    .hero{
      background:linear-gradient(135deg,#1d4ed8,#2563eb,#60a5fa);
      color:#fff;padding:28px;border-radius:24px;box-shadow:var(--shadow);margin-bottom:24px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
    }
    .flags{display:flex; gap:10px; align-items:center;}
    .flag{
      cursor:pointer;
      font-size:24px;
      line-height:1;
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.25);
      border-radius:12px;
      padding:8px 10px;
      user-select:none;
    }
    .flag.active{background:#fff;color:#1d4ed8}
    .hero h1{margin:0 0 8px;font-size:32px}
    .hero p{margin:0;line-height:1.55;max-width:1120px}
    .author{font-size:13px;opacity:.95;margin-top:10px}
    .toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    button{
      border:none;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;transition:.15s ease
    }
    button:hover{transform:translateY(-1px)}
    .btn-light{background:#fff;color:var(--blue)}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-green{background:#0f766e;color:#fff}
    .btn-brown{background:#7c2d12;color:#fff}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
    .stat .label{font-size:13px;color:var(--muted);margin-bottom:8px}
    .stat .value{font-size:24px;font-weight:800}
    .layout{display:grid;grid-template-columns:1.02fr 1.28fr;gap:24px}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      padding:22px;box-shadow:var(--shadow);margin-bottom:24px;
    }
    h2,h3{margin-top:0}
    .subtle{color:#000000;font-size:14px;line-height:1.55}
    .pill{
      display:inline-block;padding:6px 10px;border-radius:999px;background:#dbeafe;
      color:var(--blue);font-size:12px;font-weight:700
    }
    .section-header{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px
    }
    .formula{color:#000000;
      background:#f8fafc;border:1px solid var(--line);border-radius:12px;
      padding:12px;font-family:"Courier New", monospace;font-size:13px;line-height:1.7;margin-top:12px;
      white-space:pre-line;
    }
    .formula.small-formula{font-size:12px; line-height:1.55;}
    table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
    th,td{padding:12px 10px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:middle}
    th{background:#f8fafc;color:#334155}
    tr:last-child td{border-bottom:none}
    .compact-table{font-size:12.5px}
    .compact-table th,.compact-table td{padding:9px 7px}
    .compact-table input[type="number"], .compact-table input[type="text"]{font-size:12px;padding:8px 8px}
    input[type="number"], input[type="text"]{
      width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;
      font-size:14px;outline:none;background:#fff
    }
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .correct{border-color:var(--green)!important;background:#dcfce7!important}
    .incorrect{border-color:var(--red)!important;background:#fee2e2!important}
    .check-cell{width:52px;text-align:center;font-size:20px;font-weight:900}
    .ok{color:var(--green)}
    .bad{color:var(--red)}
    .feedback{
      margin-top:16px;padding:14px 16px;border-radius:14px;background:#f8fafc;border:1px dashed #cbd5e1;line-height:1.6
    }
    .note{color:#000000;
      background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:10px 12px;
      font-size:14px;margin-top:12px
    }
    .live{color:#000000;
      background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;margin-top:14px;line-height:1.65
    }
    .compare-box{color:#000000;
      margin-top:14px;
      padding:14px 16px;
      border-radius:14px;
      background:#f0fdf4;
      border:1px solid #bbf7d0;
      line-height:1.65;
    }
    details{
      margin-top:14px;
      background:#fafafa;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
    }
    summary{
      cursor:pointer;
      padding:12px 14px;
      font-weight:700;
      background:#f8fafc;
      color:#334155;
      user-select:none;
    }
    .details-content{
      padding:14px;
      border-top:1px solid var(--line);
    }
    @media (max-width:1150px){
      .layout,.stats{grid-template-columns:1fr}
      .topbar{align-items:stretch}
    }
  
    .story{
      background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:16px 18px;line-height:1.7;margin-top:14px;color:#111827;
    }
    .askbox{
      margin-top:18px;
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
    }
    .askbox textarea{
      width:100%;
      min-height:110px;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      font-size:14px;
      resize:vertical;
      font-family:Arial, Helvetica, sans-serif;
    }
    .ask-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .mini-btn{
      border:none;
      border-radius:10px;
      padding:10px 12px;
      font-weight:700;
      cursor:pointer;
    }
    .mini-btn.copy{background:#1d4ed8;color:#fff}
    .mini-btn.fill{background:#e2e8f0;color:#1f2937}
    .ask-note{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      line-height:1.55;
    }


    .decision-box{
      margin-top:24px;
      background:#ffffff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      box-shadow:var(--shadow);
      color:#000000;
    }
    .decision-box textarea{
      width:100%;
      min-height:120px;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      font-size:14px;
      font-family:Arial, Helvetica, sans-serif;
      resize:vertical;
      color:#000000;
    }
    .decision-prompt{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      margin-top:12px;
      line-height:1.6;
      color:#000000;
    }
    .memo-wrap{color:#111827;}
    .memo-title{font-size:18px;font-weight:800;letter-spacing:.4px;margin-bottom:14px;}
    .memo-meta{margin-bottom:4px;line-height:1.55;}
    .memo-section{margin-top:18px;}
    .memo-heading{font-weight:800;margin-bottom:8px;font-size:14px;text-transform:none;}
    .memo-wrap p{margin:0 0 10px 0;line-height:1.7;}

</style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="topbar">
        <div>
          <h1 id="heroTitle">Direct Costing vs ABC Costing</h1>
          <p id="heroSubtitle">
            Edit the parameters below. The header and formulas update automatically. Students can try the exercise first, and only open the answer sections if they need help.
          </p>
          <div class="author">By Adriano Lima e Silva</div>
          <div class="story" id="caseNarrative"></div>
          <div class="askbox">
            <h3 id="askTitle" style="margin:0 0 8px 0;"></h3>
            <p class="subtle" id="askSubtitle" style="margin-top:0;"></p>
            <div class="formula" id="askPrompt" style="min-height:120px;"></div>
            <div class="ask-actions">
              <button class="mini-btn fill" id="fillPrompt1" onclick="fillPrompt(1)"></button>
              <button class="mini-btn fill" id="fillPrompt2" onclick="fillPrompt(2)"></button>
              <button class="mini-btn fill" id="fillPrompt3" onclick="fillPrompt(3)"></button>
              <button class="mini-btn copy" id="copyPromptBtn" style="display:none;" onclick="fillPrompt(1)"></button>
            </div>
            <div class="ask-note" id="askNote"></div>
          </div>

        </div>
        <div class="flags">
          <span class="flag active" id="flag-en" onclick="setLang('en')">🇺🇸</span>
          <span class="flag" id="flag-pt" onclick="setLang('pt')">🇧🇷</span>
          <span class="flag" id="flag-es" onclick="setLang('es')">🇪🇸</span>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn-light" id="btnLoad" onclick="loadProvidedCase()"></button>
        <button class="btn-green" id="btnRandom" onclick="generateRandomCase()"></button>
        <button class="btn-blue" id="btnUpdate" style="display:none;" onclick="applyParameters()"></button>
        <button class="btn-blue" id="btnCheck" onclick="checkAnswers()"></button>
        <button class="btn-brown" id="btnRedo" onclick="resetExercise()"></button>
      </div>
    </section>

    <section class="stats">
      <div class="stat"><div class="label" id="statLbl1"></div><div class="value" id="statDirect2024">100.000</div></div>
      <div class="stat"><div class="label" id="statLbl2"></div><div class="value" id="statIpca">0,00%</div></div>
      <div class="stat"><div class="label" id="statLbl3"></div><div class="value" id="statOverhead2025">100.000</div></div>
      <div class="stat"><div class="label" id="statLbl4"></div><div class="value" id="statABCTotal">108.000</div></div>
    </section>

    <div class="layout">
      <div>
        <div class="card">
          <div class="section-header">
            <h2 id="editableTitle"></h2>
            <span class="pill" id="editablePill"></span>
          </div>
          <p class="subtle" id="editableSubtitle"></p>

          <h3 id="directInputsTitle"></h3>
          <table>
            <thead>
              <tr><th id="paramHdr"></th><th id="valueHdr"></th></tr>
            </thead>
            <tbody>
              <tr><td id="lblDirectCost2024"></td><td><input type="number" id="p_directCost2024" step="0.01"></td></tr>
              <tr><td id="lblIpca"></td><td><input type="number" id="p_ipcaPct" step="0.01"></td></tr>
              <tr><td id="lblHoursA"></td><td><input type="number" id="p_directHoursA" step="0.01"></td></tr>
              <tr><td id="lblHoursB"></td><td><input type="number" id="p_directHoursB" step="0.01"></td></tr>
              <tr><td id="lblUnitsA"></td><td><input type="number" id="p_unitsA" step="0.01"></td></tr>
              <tr><td id="lblUnitsB"></td><td><input type="number" id="p_unitsB" step="0.01"></td></tr>
            </tbody>
          </table>

          <details>
            <summary id="summaryDirect"></summary>
            <div class="details-content">
              <div class="formula" id="directFormulaBox"></div>
              <div class="live" id="directLiveBox"></div>
            </div>
          </details>

          <h3 style="margin-top:24px;" id="abcInputsTitle"></h3>
          <table class="compact-table">
            <thead>
              <tr>
                <th id="abcHdrActivity"></th>
                <th id="abcHdrCost"></th>
                <th id="abcHdrDriver"></th>
                <th id="abcHdrTotal"></th>
                <th id="abcHdrA"></th>
                <th id="abcHdrB"></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td id="actSetup"></td>
                <td><input type="number" id="p_abcSetupCost" step="0.01"></td>
                <td><input type="text" id="p_abcSetupDriver"></td>
                <td><input type="number" id="p_abcSetupTotal" step="0.01"></td>
                <td><input type="number" id="p_abcSetupA" step="0.01"></td>
                <td><input type="number" id="p_abcSetupB" step="0.01"></td>
              </tr>
              <tr>
                <td id="actTests"></td>
                <td><input type="number" id="p_abcTestCost" step="0.01"></td>
                <td><input type="text" id="p_abcTestDriver"></td>
                <td><input type="number" id="p_abcTestTotal" step="0.01"></td>
                <td><input type="number" id="p_abcTestA" step="0.01"></td>
                <td><input type="number" id="p_abcTestB" step="0.01"></td>
              </tr>
              <tr>
                <td id="actMovement"></td>
                <td><input type="number" id="p_abcMoveCost" step="0.01"></td>
                <td><input type="text" id="p_abcMoveDriver"></td>
                <td><input type="number" id="p_abcMoveTotal" step="0.01"></td>
                <td><input type="number" id="p_abcMoveA" step="0.01"></td>
                <td><input type="number" id="p_abcMoveB" step="0.01"></td>
              </tr>
            </tbody>
          </table>

          <details>
            <summary id="summaryABC"></summary>
            <div class="details-content">
              <div class="formula small-formula" id="abcFormulaBox"></div>
              <div class="live" id="abcLiveBox"></div>
              <div class="compare-box" id="compareBox"></div>
            </div>
          </details>

          <div class="note" id="noteText"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2 id="studentDirectTitle"></h2>
          <table>
            <thead>
              <tr><th id="studentItemHdr1"></th><th id="studentAnswerHdr1"></th><th id="studentCheckHdr1"></th></tr>
            </thead>
            <tbody>
              <tr><td id="ansDirect1"></td><td><input type="number" id="d_overhead_2025" step="0.01"></td><td class="check-cell" id="c_d_overhead_2025"></td></tr>
              <tr><td id="ansDirect2"></td><td><input type="number" id="d_total_hours" step="0.01"></td><td class="check-cell" id="c_d_total_hours"></td></tr>
              <tr><td id="ansDirect3"></td><td><input type="number" id="d_hour_rate" step="0.01"></td><td class="check-cell" id="c_d_hour_rate"></td></tr>
              <tr><td id="ansDirect4"></td><td><input type="number" id="d_alloc_a" step="0.01"></td><td class="check-cell" id="c_d_alloc_a"></td></tr>
              <tr><td id="ansDirect5"></td><td><input type="number" id="d_alloc_b" step="0.01"></td><td class="check-cell" id="c_d_alloc_b"></td></tr>
              <tr><td id="ansDirect6"></td><td><input type="number" id="d_unit_a" step="0.01"></td><td class="check-cell" id="c_d_unit_a"></td></tr>
              <tr><td id="ansDirect7"></td><td><input type="number" id="d_unit_b" step="0.01"></td><td class="check-cell" id="c_d_unit_b"></td></tr>
            </tbody>
          </table>
        </div>

        <div class="card">
          <h2 id="studentABCTitle"></h2>
          <table>
            <thead>
              <tr><th id="studentItemHdr2"></th><th id="studentAnswerHdr2"></th><th id="studentCheckHdr2"></th></tr>
            </thead>
            <tbody>
              <tr><td id="ansABC1"></td><td><input type="number" id="abc_setup_rate" step="0.01"></td><td class="check-cell" id="c_abc_setup_rate"></td></tr>
              <tr><td id="ansABC2"></td><td><input type="number" id="abc_test_rate" step="0.01"></td><td class="check-cell" id="c_abc_test_rate"></td></tr>
              <tr><td id="ansABC3"></td><td><input type="number" id="abc_move_rate" step="0.01"></td><td class="check-cell" id="c_abc_move_rate"></td></tr>
              <tr><td id="ansABC4"></td><td><input type="number" id="abc_a_setup" step="0.01"></td><td class="check-cell" id="c_abc_a_setup"></td></tr>
              <tr><td id="ansABC5"></td><td><input type="number" id="abc_a_test" step="0.01"></td><td class="check-cell" id="c_abc_a_test"></td></tr>
              <tr><td id="ansABC6"></td><td><input type="number" id="abc_a_move" step="0.01"></td><td class="check-cell" id="c_abc_a_move"></td></tr>
              <tr><td id="ansABC7"></td><td><input type="number" id="abc_a_total" step="0.01"></td><td class="check-cell" id="c_abc_a_total"></td></tr>
              <tr><td id="ansABC8"></td><td><input type="number" id="abc_unit_a" step="0.01"></td><td class="check-cell" id="c_abc_unit_a"></td></tr>
              <tr><td id="ansABC9"></td><td><input type="number" id="abc_b_setup" step="0.01"></td><td class="check-cell" id="c_abc_b_setup"></td></tr>
              <tr><td id="ansABC10"></td><td><input type="number" id="abc_b_test" step="0.01"></td><td class="check-cell" id="c_abc_b_test"></td></tr>
              <tr><td id="ansABC11"></td><td><input type="number" id="abc_b_move" step="0.01"></td><td class="check-cell" id="c_abc_b_move"></td></tr>
              <tr><td id="ansABC12"></td><td><input type="number" id="abc_b_total" step="0.01"></td><td class="check-cell" id="c_abc_b_total"></td></tr>
              <tr><td id="ansABC13"></td><td><input type="number" id="abc_unit_b" step="0.01"></td><td class="check-cell" id="c_abc_unit_b"></td></tr>
            </tbody>
          </table>

          <div class="feedback" id="feedbackBox"></div>
        </div>
        <div class="decision-box">
          <h2 id="decisionTitle"></h2>
          <p id="decisionSubtitle" class="subtle"></p>
          <div class="decision-prompt" id="decisionPrompt"></div>
          <div style="margin-top:12px;">
            <label id="decisionLabel" style="display:none;" for="decisionResponse" style="display:block;font-weight:700;margin-bottom:8px;"></label>
            <div class="decision-prompt" id="decisionMemo"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

function validateParameters(c){
  const nums = [
    c.directCost2024, c.directHoursA, c.directHoursB, c.unitsA, c.unitsB,
    c.abcSetupCost, c.abcSetupTotal, c.abcSetupA, c.abcSetupB,
    c.abcTestCost, c.abcTestTotal, c.abcTestA, c.abcTestB,
    c.abcMoveCost, c.abcMoveTotal, c.abcMoveA, c.abcMoveB
  ];
  if(nums.some(v => isNaN(v) || v < 0)) return t('errNonNegative');
  if(c.abcSetupTotal === 0 || c.abcTestTotal === 0 || c.abcMoveTotal === 0) return t('errABCZero');
  if(c.unitsA === 0 || c.unitsB === 0) return t('errUnitsZero');
  if((c.abcSetupA + c.abcSetupB) !== c.abcSetupTotal) return t('errSetup');
  if((c.abcTestA + c.abcTestB) !== c.abcTestTotal) return t('errTests');
  if((c.abcMoveA + c.abcMoveB) !== c.abcMoveTotal) return t('errMove');
  return '';
}

function calculateAnswers(c){
  const overhead2025 = round2(c.directCost2024 * (1 + c.ipcaPct / 100));
  const totalHours = round2(c.directHoursA + c.directHoursB);
  const hourRate = round2(overhead2025 / totalHours);
  const allocA = round2(c.directHoursA * hourRate);
  const allocB = round2(c.directHoursB * hourRate);
  const unitA = round2(allocA / c.unitsA);
  const unitB = round2(allocB / c.unitsB);

  const setupRate = round2(c.abcSetupCost / c.abcSetupTotal);
  const testRate = round2(c.abcTestCost / c.abcTestTotal);
  const moveRate = round2(c.abcMoveCost / c.abcMoveTotal);

  const aSetup = round2(c.abcSetupA * setupRate);
  const aTest = round2(c.abcTestA * testRate);
  const aMove = round2(c.abcMoveA * moveRate);
  const aTotal = round2(aSetup + aTest + aMove);
  const aUnit = round2(aTotal / c.unitsA);

  const bSetup = round2(c.abcSetupB * setupRate);
  const bTest = round2(c.abcTestB * testRate);
  const bMove = round2(c.abcMoveB * moveRate);
  const bTotal = round2(bSetup + bTest + bMove);
  const bUnit = round2(bTotal / c.unitsB);

  return {
    d_overhead_2025: overhead2025,
    d_total_hours: totalHours,
    d_hour_rate: hourRate,
    d_alloc_a: allocA,
    d_alloc_b: allocB,
    d_unit_a: unitA,
    d_unit_b: unitB,
    abc_setup_rate: setupRate,
    abc_test_rate: testRate,
    abc_move_rate: moveRate,
    abc_a_setup: aSetup,
    abc_a_test: aTest,
    abc_a_move: aMove,
    abc_a_total: aTotal,
    abc_unit_a: aUnit,
    abc_b_setup: bSetup,
    abc_b_test: bTest,
    abc_b_move: bMove,
    abc_b_total: bTotal,
    abc_unit_b: bUnit
  };
}



function generateMemo(params, answers){
  const a = answers;
  const currency = getCurrency();

  const diffA = round2(a.abc_unit_a - a.d_unit_a);
  const diffB = round2(a.abc_unit_b - a.d_unit_b);

  function fmt(v){
    return `${currency} ${brNum(v,2)}`;
  }

  return `
    <div class="memo-wrap">
      <div class="memo-title">MEMORANDUM</div>
      <div class="memo-meta"><strong>To:</strong> Board of Directors</div>
      <div class="memo-meta"><strong>From:</strong> Strategic Finance Advisory</div>
      <div class="memo-meta"><strong>Subject:</strong> Cost Allocation Method Assessment – Direct Costing vs. Activity-Based Costing (ABC)</div>

      <div class="memo-section">
        <div class="memo-heading">Executive Summary</div>
        <p>This memorandum evaluates the financial and strategic implications of applying a traditional single-rate overhead allocation method (Direct Costing) versus an Activity-Based Costing (ABC) framework. The analysis indicates that the direct method creates cost distortions where products consume support activities at different intensities, while ABC provides a more decision-useful view of product economics by assigning costs according to actual operational drivers.</p>
      </div>

      <div class="memo-section">
        <div class="memo-heading">Key Findings</div>
        <p><strong>Product A:</strong> Direct Costing = ${fmt(a.d_unit_a)} per unit; ABC = ${fmt(a.abc_unit_a)} per unit; Variance = ${fmt(diffA)}</p>
        <p><strong>Product B:</strong> Direct Costing = ${fmt(a.d_unit_b)} per unit; ABC = ${fmt(a.abc_unit_b)} per unit; Variance = ${fmt(diffB)}</p>
        <p>The variance confirms that a single allocation base can mask meaningful differences in resource consumption. ABC more accurately reflects the burden created by setups, tests, and material movements, thereby improving cost visibility at the product level.</p>
      </div>

      <div class="memo-section">
        <div class="memo-heading">Margin and Pricing Impact</div>
        <p>The observed differences in unit cost have direct implications for pricing, margin quality, and product mix decisions. Products that are undercosted under the direct method may be priced too aggressively, compressing profitability. Products that are overcosted may become less competitive in the market. ABC supports a more reliable pricing discipline by aligning commercial decisions with the underlying economics of each product.</p>
      </div>

      <div class="memo-section">
        <div class="memo-heading">Sensitivity Considerations</div>
        <p>The gap between the two methodologies is highly sensitive to shifts in activity volumes, production mix, and operating complexity. As the frequency of setups, testing requirements, or material handling events increases, the divergence between Direct Costing and ABC is likely to widen, increasing the risk of managerial misinterpretation if the company relies solely on a single-rate allocation model.</p>
      </div>

      <div class="memo-section">
        <div class="memo-heading">Risk Considerations</div>
        <p>Continued reliance on a simplified overhead allocation structure introduces pricing risk, strategic risk, and operational risk. Misstated product economics can distort customer quotations, capital allocation decisions, and performance assessments. In competitive environments, these distortions may also weaken the company’s market positioning over time.</p>
      </div>

      <div class="memo-section">
        <div class="memo-heading">Recommendation</div>
        <p>We recommend adopting ABC as the primary internal decision-support framework for pricing analysis, profitability review, and strategic planning. The traditional direct costing method may still be maintained for simplicity in external reporting or instructional comparison, but it should not serve as the sole basis for internal management decisions in environments characterized by heterogeneous operational activity.</p>
      </div>

      <div class="memo-section">
        <div class="memo-heading">Conclusion</div>
        <p>ABC enhances cost transparency, strengthens margin analysis, and improves the quality of managerial decision-making. In practical terms, it provides the Board and management with a more reliable basis for evaluating profitability, setting prices, and prioritizing operational improvements.</p>
      </div>
    </div>`;
}

function applyParameters(){
  const params = getParametersFromInputs();
  const error = validateParameters(params);
  if(error){
    document.getElementById('feedbackBox').innerHTML = `<span class="bad"><strong>${t('error')}:</strong> ${error}</span>`;
    return;
  }
  currentCase = params;
  currentCase.answers = calculateAnswers(currentCase);
  renderDynamic();
  clearChecks();
  clearStudentInputs();
  lastFeedbackKey = 'caseUpdated';
  document.getElementById('feedbackBox').innerHTML = t(lastFeedbackKey);
  document.getElementById('caseNarrative').textContent = t('narrative');
}

function compareValue(student, expected){
  if(student === '' || student === null) return false;
  return Math.abs(Number(student) - Number(expected)) <= 0.8;
}

function markField(id, ok){
  const input = document.getElementById(id);
  const cell = document.getElementById('c_' + id);
  input.classList.remove('correct','incorrect');
  input.classList.add(ok ? 'correct' : 'incorrect');
  cell.innerHTML = ok ? '<span class="ok">✔</span>' : '<span class="bad">✘</span>';
}

function checkAnswers(){
  const params = getParametersFromInputs();
  const error = validateParameters(params);
  if(error){
    document.getElementById('feedbackBox').innerHTML = `<span class="bad"><strong>${t('error')}:</strong> ${error}</span>`;
    return;
  }
  currentCase = params;
  currentCase.answers = calculateAnswers(currentCase);

  const keys = Object.keys(currentCase.answers);
  let correct = 0;
  keys.forEach(key => {
    const val = document.getElementById(key).value;
    const ok = compareValue(val, currentCase.answers[key]);
    markField(key, ok);
    if(ok) correct++;
  });

  const total = keys.length;
  const pct = round2(correct / total * 100);
  let msg = `<strong>${t('result')}:</strong> ${correct} of ${total} correct (${pct}%).<br>`;
  if(correct === total){
    msg += `<span class="ok"><strong>${t('excellent')}</strong> ${t('allCorrect')}</span>`;
  } else if(correct >= total * 0.7){
    msg += `<span style="color:#92400e;"><strong>${t('goodWork')}</strong> ${t('fewReview')}</span>`;
  } else {
    msg += `<span class="bad"><strong>${t('reviewFormulas')}</strong> ${t('checkRate')}</span>`;
  }
  document.getElementById('feedbackBox').innerHTML = msg;
}

}

function randomInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }
function splitInt(total, minPart=1){
  const a = randomInt(minPart, total - minPart);
  return [a, total - a];
}

    abcSetupTotal,
    abcSetupA,
    abcSetupB,

    abcTestCost: randomInt(18000, 60000),

    abcTestTotal,
    abcTestA,
    abcTestB,

    abcMoveCost: randomInt(20000, 65000),
    abcMoveDriver: 'movements',
